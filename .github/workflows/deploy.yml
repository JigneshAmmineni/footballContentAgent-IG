name: Deploy to Agent Engine

on:
  push:
    branches: [main]

# Prevent concurrent deploys — a new push waits for the in-flight deploy to finish.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for Workload Identity Federation
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deploy dependencies
        # Only the packages deploy.py itself needs to import — not the full
        # requirements.txt (which is Windows-only in places and 200+ packages).
        # The app/ code is bundled into the Agent Engine container separately.
        run: pip install google-cloud-aiplatform==1.148.1 python-dotenv==1.2.2

      - name: Deploy to Agent Engine
        run: python deploy.py
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION }}
          # If set, deploy.py updates this resource instead of creating a new one.
          # After the first deploy, copy the printed resource name here.
          AGENT_ENGINE_RESOURCE_NAME: ${{ secrets.AGENT_ENGINE_RESOURCE_NAME }}
